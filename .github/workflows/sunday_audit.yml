name: Sunday Chore Audit
on:
  schedule:
    - cron: '0 20 * * 0' # 8:00 PM UTC every Sunday
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
      - run: pip install -r requirements.txt
      - name: Run Audit
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python audit_chores.py
        
      - name: Commit Ledger Update
        run: |
          git config --global user.name "ChoreBot"
          git config --global user.email "bot@example.com"
          git add ledger.json
          git commit -m "Audit completed: updated fines" || echo "No changes to commit"
          git push